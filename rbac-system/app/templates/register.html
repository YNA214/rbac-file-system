<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8"><title>注册</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; }
        .card { background: rgba(255,255,255,0.95); border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); padding: 30px; }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); border: none; border-radius: 25px; padding: 10px 30px; }
        .form-control { border-radius: 25px; padding: 10px 20px; }
    </style>
</head>
<body>
    <div class="container"><div class="row justify-content-center"><div class="col-md-4">
        <div class="card">
            <h3 class="text-center mb-4" style="color:#667eea;font-weight:700;">📝 用户注册</h3>
            <form id="f">
                <div class="mb-3"><input type="text" id="username" class="form-control" placeholder="用户名" required></div>
                <div class="mb-3"><input type="email" id="email" class="form-control" placeholder="邮箱" required></div>
                <div class="mb-3"><input type="password" id="password" class="form-control" placeholder="密码" required></div>
                <div class="mb-3"><input type="password" id="confirm" class="form-control" placeholder="确认密码" required></div>
                <button type="submit" class="btn btn-primary w-100">注 册</button>
            </form>
            <div id="error" class="text-danger mt-2 text-center"></div>
            <div class="mt-3 text-center"><a href="/login" class="text-muted">已有账号？去登录</a></div>
        </div>
    </div></div></div>
    <script>
        document.getElementById('f').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value, m = document.getElementById('email').value;
            const p = document.getElementById('password').value, c = document.getElementById('confirm').value;
            const err = document.getElementById('error');
            if (p !== c) { err.textContent = '两次密码不一致'; return; }
            if (p.length < 8) { err.textContent = '密码至少8位'; return; }
            if (!/[A-Z]/.test(p)) { err.textContent = '需包含大写字母'; return; }
            if (!/[a-z]/.test(p)) { err.textContent = '需包含小写字母'; return; }
            if (!/[0-9]/.test(p)) { err.textContent = '需包含数字'; return; }
            try {
                const r = await fetch('/api/v1/register', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, email:m, password:p}) });
                const d = await r.json();
                if (r.ok) { alert('注册成功！'); window.location.href = '/login'; }
                else { err.textContent = d.message || '注册失败'; }
            } catch(e) { err.textContent = '网络错误'; }
        });
    </script>
</body>
</html>
