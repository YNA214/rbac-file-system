<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8"><title>审计日志 - RBAC 系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark"><div class="container-fluid"><span class="navbar-brand">RBAC 文件管理系统</span><div class="d-flex"><a href="/file-manager" class="btn btn-outline-light btn-sm me-2">文件管理</a><button class="btn btn-outline-light btn-sm" onclick="logout()">退出</button></div></div></nav>
<div class="container-fluid mt-3">
<h4 id="logTitle">审计日志</h4>
<table class="table table-striped table-hover">
<thead class="table-dark"><tr><th>ID</th><th>用户</th><th>操作</th><th>文件ID</th><th>IP地址</th><th>时间</th><th>结果</th></tr></thead>
<tbody id="logList"><tr><td colspan="7" class="text-center">加载中...</td></tr></tbody>
</table>
</div>
<script>
const token = localStorage.getItem('token');
if (!token) window.location.href = '/login';
loadLogs();

async function loadLogs() {
    const tbody = document.getElementById('logList');
    try {
        const resp = await fetch('/api/v1/audit-log', {headers: {'Authorization': 'Bearer ' + token}});
        if (!resp.ok) { tbody.innerHTML = '<tr><td colspan="7" class="text-danger">无权限</td></tr>'; return; }
        const data = await resp.json();
        const logs = data.logs || [];
        document.getElementById('logTitle').textContent = data.is_admin ? '审计日志（全部用户）' : '我的操作日志';
        if (!logs.length) { tbody.innerHTML = '<tr><td colspan="7" class="text-muted">暂无日志</td></tr>'; return; }
        tbody.innerHTML = logs.map(l => 
            '<tr><td>' + l.id + '</td><td>' + (l.username||'') + '</td><td>' + l.action + '</td><td>' + l.file_id + '</td><td>' + (l.ip_address||'') + '</td><td>' + l.timestamp + '</td><td><span class="badge ' + (l.success ? 'bg-success' : 'bg-danger') + '">' + (l.success ? '成功' : '失败') + '</span></td></tr>'
        ).join('');
    } catch(e) { tbody.innerHTML = '<tr><td colspan="7" class="text-danger">加载错误</td></tr>'; }
}
function logout() { localStorage.clear(); window.location.href = '/login'; }
</script>
</body>
</html>
