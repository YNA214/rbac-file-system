<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>登录 - RBAC 文件管理系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; }
        .login-card { background: rgba(255,255,255,0.95); border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); padding: 40px; }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); border: none; border-radius: 25px; padding: 10px 30px; }
        .form-control { border-radius: 25px; padding: 10px 20px; }
        h3 { color: #667eea; font-weight: 700; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="login-card">
                    <h3 class="text-center mb-4">🔐 文件管理系统</h3>
                    <form id="loginForm">
                        <div class="mb-3"><input type="text" id="username" class="form-control" placeholder="用户名" required></div>
                        <div class="mb-3"><input type="password" id="password" class="form-control" placeholder="密码" required></div>
                        <button type="submit" class="btn btn-primary w-100">登 录</button>
                    </form>
                    <div id="error" class="text-danger mt-2 text-center"></div>
                    <div class="mt-3 text-center"><a href="/register" class="text-muted">没有账号？去注册</a></div>
                </div>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            document.getElementById('error').textContent = '';
            try {
                const r = await fetch('/api/v1/security/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p, provider:'db'}) });
                const d = await r.json();
                if (r.ok && d.access_token) {
                    localStorage.setItem('token', d.access_token);
                    const rr = await fetch('/api/v1/user/roles', { headers:{'Authorization':'Bearer '+d.access_token} });
                    const rd = await rr.json();
                    localStorage.setItem('user', JSON.stringify({username:u, roles:(rd.roles||[]).map(r=>({name:r}))}));
                    window.location.href = '/file-manager';
                } else { document.getElementById('error').textContent = d.message || '登录失败'; }
            } catch(e) { document.getElementById('error').textContent = '网络错误'; }
        });
    </script>
</body>
</html>
