services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: rbac
    ports:
      - "3307:3306"
    networks:
      - rbac-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    networks:
      - rbac-net
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
    volumes:
      - D:/Git/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf
      - D:/Git/nginx/certs:/etc/nginx/certs
    networks:
      - rbac-net
    depends_on:
      - app

networks:
  rbac-net:
    driver: bridge
